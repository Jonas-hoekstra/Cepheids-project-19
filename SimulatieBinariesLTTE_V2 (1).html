<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTTE Simulatie - Drievoudig Stersysteem</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; }
        h1 { text-align: center; color: #4dabf7; }
        .container { display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; gap: 20px; }
        #canvas-container { width: 100%; height: 500px; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #2c2c2c; padding: 20px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value-display { color: #4dabf7; font-weight: normal; }
        #graph-container { background: #2c2c2c; padding: 20px; border-radius: 8px; text-align: center; }
        canvas#oc-graph { background: #1e1e1e; border: 1px solid #444; border-radius: 4px; width: 100%; height: 250px; }
        .info-overlay { position: absolute; top: 10px; left: 10px; pointer-events: none; font-size: 12px; color: #aaa; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div class="container">
    <h1>Light-Travel-Time Effect (LTTE) Simulatie</h1>
    
    <div id="canvas-container">
        <div class="info-overlay">Sleep met muis om te draaien.<br>Scroll om te zoomen.</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Halve lange as a_AB: <span id="val-a" class="value-display">305</span></label>
            <input type="range" id="slider-a" min="100" max="500" value="305">
        </div>
        <div class="control-group">
            <label>Inclinatie i_2 (graden): <span id="val-i" class="value-display">90</span>°</label>
            <input type="range" id="slider-i" min="0" max="180" value="90">
        </div>
        <div class="control-group">
            <label>Excentriciteit e_2: <span id="val-e" class="value-display">0.53</span></label>
            <input type="range" id="slider-e" min="0" max="0.95" step="0.01" value="0.53">
        </div>
        <div class="control-group">
            <label>Argument van periastron ω_2: <span id="val-w" class="value-display">149</span>°</label>
            <input type="range" id="slider-w" min="0" max="360" value="149">
        </div>
        <div class="control-group full-width" style="margin-top: 10px;">
            <label style="color: #69db7c;">Simulatiesnelheid: <span id="val-s" class="value-display">1.0</span>x</label>
            <input type="range" id="slider-s" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
    </div>

    <div id="graph-container">
        <h3 style="margin-top:0;">O-C (Tijdsverschil) Grafiek</h3>
        <p style="font-size: 13px; color: #ccc; margin-bottom: 10px;">X-as: Baanpositie (Ware anomalie) | Y-as: O-C Variatie (Tijdsverschil licht)</p>
        <canvas id="oc-graph" width="960" height="250"></canvas>
    </div>
</div>

<script>
    // --- 1. GLOBALE VARIABELEN ---
    let params = {
        a: 305,
        i: 90,
        e: 0.53,
        w: 149,
        s: 1.0, // Snelheid
        v: 0 // ware anomalie (huidige positie in graden)
    };
    let innerBinaryPhase = 0; // Voor het draaien van de dubbelster zelf

    // HTML Elementen
    const sliders = {
        a: document.getElementById('slider-a'),
        i: document.getElementById('slider-i'),
        e: document.getElementById('slider-e'),
        w: document.getElementById('slider-w'),
        s: document.getElementById('slider-s')
    };
    const displays = {
        a: document.getElementById('val-a'),
        i: document.getElementById('val-i'),
        e: document.getElementById('val-e'),
        w: document.getElementById('val-w'),
        s: document.getElementById('val-s')
    };
    const graphCanvas = document.getElementById('oc-graph');
    const ctx = graphCanvas.getContext('2d');

    // Event Listeners voor schuifjes
    for (let key in sliders) {
        sliders[key].addEventListener('input', (e) => {
            params[key] = parseFloat(e.target.value);
            displays[key].innerText = params[key];
            if(key !== 's' && key !== 'v') {
                updateOrbitPath();
            }
        });
    }

    // --- 2. THREE.JS 3D SCENE SETUP ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 4000);
    camera.position.set(0, 800, 800);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lichten
    scene.add(new THREE.AmbientLight(0x404040));
    const pointLight = new THREE.PointLight(0xffffff, 1.5, 2000);
    scene.add(pointLight);

    // Objecten: Aarde
    const earthGeo = new THREE.SphereGeometry(20, 32, 32);
    const earthMat = new THREE.MeshPhongMaterial({ color: 0x4dabf7 });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    earth.position.set(0, 0, 1000); 
    scene.add(earth);

    // Label Aarde
    const earthSprite = createTextSprite("Aarde");
    earthSprite.position.set(0, 35, 1000);
    scene.add(earthSprite);

    // Objecten: Derde Massa (Centrum)
    const centerGeo = new THREE.SphereGeometry(15, 32, 32);
    const centerMat = new THREE.MeshPhongMaterial({ color: 0xffdd44, emissive: 0xaa8800 });
    const centerMass = new THREE.Mesh(centerGeo, centerMat);
    scene.add(centerMass);
    
    const centerSprite = createTextSprite("Derde Massa");
    centerSprite.position.set(0, -25, 0);
    scene.add(centerSprite);

    // Baanlijn en Dubbelster-groep (hiërarchie)
    const orbitGroup = new THREE.Group(); 
    scene.add(orbitGroup);

    let orbitLine;
    const orbitMat = new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.5 });

    // De Dubbelster (Inner binary)
    const binaryGroup = new THREE.Group();
    orbitGroup.add(binaryGroup);
    
    const binarySprite = createTextSprite("Dubbelster (Ster 1 & 2)");
    binarySprite.position.set(0, 30, 0);
    binaryGroup.add(binarySprite);

    const star1Geo = new THREE.SphereGeometry(8, 16, 16);
    const star1Mat = new THREE.MeshPhongMaterial({ color: 0xff8888 });
    const star1 = new THREE.Mesh(star1Geo, star1Mat);
    binaryGroup.add(star1);

    const star2Geo = new THREE.SphereGeometry(8, 16, 16);
    const star2Mat = new THREE.MeshPhongMaterial({ color: 0x8888ff });
    const star2 = new THREE.Mesh(star2Geo, star2Mat);
    binaryGroup.add(star2);

    // Gestippelde kijklijn (Line of Sight) tussen Aarde en Dubbelster
    const sightLineMat = new THREE.LineDashedMaterial({
        color: 0x69db7c,
        linewidth: 1,
        scale: 1,
        dashSize: 15,
        gapSize: 10,
        transparent: true,
        opacity: 0.7
    });
    // Tijdelijke geometrie
    const sightLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const sightLine = new THREE.Line(sightLineGeo, sightLineMat);
    scene.add(sightLine);

    // Helper functie voor tekstlabels
    function createTextSprite(text) {
        const canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 64;
        const context = canvas.getContext('2d');
        context.font = '24px sans-serif';
        context.fillStyle = 'white';
        context.textAlign = 'center';
        context.fillText(text, 150, 32);
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(120, 25, 1);
        return sprite;
    }

    // Update de fysieke eigenschappen van de baan in 3D
    function updateOrbitPath() {
        if (orbitLine) orbitGroup.remove(orbitLine);

        const a = params.a;
        const e = params.e;
        
        const points = [];
        for (let i = 0; i <= 360; i += 2) {
            const rad = i * Math.PI / 180;
            const r = (a * (1 - e * e)) / (1 + e * Math.cos(rad)); 
            const x = r * Math.cos(rad);
            const y = r * Math.sin(rad); 
            points.push(new THREE.Vector3(x, y, 0));
        }

        const geo = new THREE.BufferGeometry().setFromPoints(points);
        orbitLine = new THREE.Line(geo, orbitMat);
        orbitGroup.add(orbitLine);

        orbitGroup.rotation.z = params.w * Math.PI / 180; 
        orbitGroup.rotation.x = params.i * Math.PI / 180;
    }

    // --- 3. 2D GRAFIEK TEKENEN ---
    function drawGraph() {
        const width = graphCanvas.width;
        const height = graphCanvas.height;
        ctx.clearRect(0, 0, width, height);

        // Assenstelsel
        ctx.strokeStyle = '#555';
        ctx.beginPath();
        ctx.moveTo(0, height / 2);
        ctx.lineTo(width, height / 2);
        ctx.stroke();

        ctx.strokeStyle = '#4dabf7';
        ctx.lineWidth = 2;
        ctx.beginPath();

        const a = params.a;
        const e = params.e;
        const i_rad = params.i * Math.PI / 180;
        const w_rad = params.w * Math.PI / 180;
        
        // Teken de lijn
        for (let degree = 0; degree <= 360; degree++) {
            const v_rad = degree * Math.PI / 180;
            const ltte = -(a * Math.sin(i_rad)) * ((1 - e * e) * Math.sin(v_rad + w_rad)) / (1 + e * Math.cos(v_rad));
            const x = (degree / 360) * width;
            const scaleY = (height / 2) / 500; 
            const y = (height / 2) - (ltte * scaleY);
            
            if (degree === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Teken de huidige positie (v)
        const currentV = params.v % 360;
        const current_v_rad = currentV * Math.PI / 180;
        const current_ltte = -(a * Math.sin(i_rad)) * ((1 - e * e) * Math.sin(current_v_rad + w_rad)) / (1 + e * Math.cos(current_v_rad));
        
        const dotX = (currentV / 360) * width;
        const scaleY = (height / 2) / 500;
        const dotY = (height / 2) - (current_ltte * scaleY);

        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(dotX, dotY, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    // --- 4. ANIMATIE LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // 1. Beweeg de dubbelster over de baan 
        const v_rad = params.v * Math.PI / 180;
        const e = params.e;
        const r = (params.a * (1 - e * e)) / (1 + e * Math.cos(v_rad));
        
        binaryGroup.position.x = r * Math.cos(v_rad);
        binaryGroup.position.y = r * Math.sin(v_rad);
        
        // Zorg dat het tekstlabel altijd rechtop blijft staan richting camera
        binaryGroup.children[0].rotation.z = -params.w * Math.PI / 180; 

        // 2. Laat de binnenste dubbelster snel om elkaar draaien, afhankelijk van sim snelheid
        innerBinaryPhase += 0.1 * params.s;
        star1.position.x = Math.cos(innerBinaryPhase) * 15;
        star1.position.y = Math.sin(innerBinaryPhase) * 15;
        star2.position.x = Math.cos(innerBinaryPhase + Math.PI) * 15;
        star2.position.y = Math.sin(innerBinaryPhase + Math.PI) * 15;

        // 3. Update stippellijn (Zichtlijn) tussen Aarde en de HUIDIGE 3D-positie van de dubbelster
        const binaryWorldPos = new THREE.Vector3();
        binaryGroup.getWorldPosition(binaryWorldPos); // Bereken de exacte locatie van de groep in de ruimte
        sightLine.geometry.setFromPoints([earth.position, binaryWorldPos]);
        sightLine.computeLineDistances(); // Essentieel om de stippels in Three.js correct weer te geven

        // 4. Update baan-teller (snelheid hangt af van simulatiesnelheid en Kepler's wet)
        const speedFactor = Math.pow(1 + e * Math.cos(v_rad), 2) * 0.5 * params.s; 
        params.v += speedFactor;
        if (params.v >= 360) params.v = 0;

        controls.update();
        renderer.render(scene, camera);
        drawGraph();
    }

    // Start!
    updateOrbitPath();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>

</body>
</html>
